<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradePulse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    }
    .header {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .container {
      padding: 20px;
    }
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .action-btn {
      background: white;
      border: 2px solid #22c55e;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: #166534;
    }
    .action-btn:hover {
      background: #22c55e;
      color: white;
      transform: translateY(-2px);
    }
    .action-btn .icon {
      font-size: 24px;
      margin-bottom: 5px;
    }
    .action-btn .label {
      font-size: 12px;
      font-weight: 600;
    }
    .stats {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stats h3 {
      font-size: 14px;
      color: #374151;
      margin-bottom: 10px;
    }
    .stat-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e5e7eb;
    }
    .stat-item:last-child {
      border-bottom: none;
    }
    .stat-label {
      font-size: 13px;
      color: #6b7280;
    }
    .stat-value {
      font-size: 14px;
      font-weight: 600;
      color: #166534;
    }
    .open-app-btn {
      display: block;
      width: 100%;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .open-app-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>💰 TradePulse</h1>
    <p>Simple Money Tracking</p>
  </div>
  
  <div class="container">
    <div id="loading" class="loading">
      Loading...
    </div>
    
    <div id="content" style="display: none;">
      <div class="stats">
        <h3>Today's Summary</h3>
        <div class="stat-item">
          <span class="stat-label">Sales</span>
          <span class="stat-value" id="today-sales">₦0.00</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Expenses</span>
          <span class="stat-value" id="today-expenses">₦0.00</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Profit</span>
          <span class="stat-value" id="today-profit">₦0.00</span>
        </div>
      </div>
      
      <div class="quick-actions">
        <a href="#" class="action-btn" data-action="add-sale">
          <div class="icon">🛒</div>
          <div class="label">Add Sale</div>
        </a>
        <a href="#" class="action-btn" data-action="add-expense">
          <div class="icon">📝</div>
          <div class="label">Add Expense</div>
        </a>
        <a href="#" class="action-btn" data-action="customers">
          <div class="icon">👥</div>
          <div class="label">Customers</div>
        </a>
        <a href="#" class="action-btn" data-action="debts">
          <div class="icon">💳</div>
          <div class="label">Debts</div>
        </a>
      </div>
      
      <button class="open-app-btn" id="open-app">
        Open Full App
      </button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
